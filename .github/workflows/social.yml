# 매일 아침 8시(KST) 스레드에 오늘의 파킹통장 TOP3 포스팅
# 새벽 5:30 daily-update가 갱신한 data.json을 사용한다.
# THREADS_ACCESS_TOKEN 시크릿이 없으면 드라이런으로 끝난다 (사용자 ID는 토큰에서 자동 조회).
name: social-post

on:
  # 2026-07-13 자동 스케줄 중단 — 매일 같은 내용 반복 비선호 + THREADS_ACCESS_TOKEN "API access blocked"(앱 이슈)로
  # 실패 중이라 당분간 수동 발행으로 전환(claude-in-chrome로 직접 포스팅). 재개하려면 아래 schedule 주석 해제 + 토큰 재발급.
  # schedule:
  #   - cron: "0 23 * * *" # UTC 23:00 = KST 08:00
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Post daily TOP3 to Threads
        run: node scripts/post-social.js
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
